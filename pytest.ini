[tool:pytest]
# Pytest configuration for NeuroLift Technologies Simulation Environment

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=80
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    e2e: End-to-end tests for complete workflows
    slow: Tests that take longer to run
    fast: Tests that run quickly
    avatar: Tests specific to Avatar system
    aide: Tests specific to Aide system
    advocate: Tests specific to Advocate system
    simulation: Tests specific to simulation environment
    config: Tests for configuration loading and validation
    privacy: Tests for privacy and data handling
    performance: Performance and load tests
    neurodivergent: Tests that require neurodivergent perspective validation

# Minimum version
minversion = 7.0

# Test timeout (in seconds)
timeout = 300

# Parallel execution
# Use: pytest -n auto for parallel execution
# Requires pytest-xdist

# Coverage configuration
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov